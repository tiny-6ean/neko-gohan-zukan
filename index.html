<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ねこごはん図鑑</title>
  <link rel="manifest" href="manifest.json">
<style>
  body {
    font-family: system-ui, sans-serif;
    padding: 20px;
    background: #fff7ef;
    color: #333;
    max-width: 900px;
    margin: auto;
  }

  h1 {
    font-size: 22px;
    margin-bottom: 12px;
    color: #d45a22;
  }

  h2 {
    font-size: 16px;
    margin-top: 24px;
    margin-bottom: 8px;
    border-left: 4px solid #ff8a3d;
    padding-left: 8px;
  }

  form {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 8px;
    margin-bottom: 12px;
  }

  form input {
    padding: 8px;
    border: 1px solid #e2c9b0;
    border-radius: 6px;
    font-size: 13px;
    background: #fffdf9;
  }

  form button {
    padding: 10px;
    background: #ff8a3d;
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }

  form button:hover {
    background: #e56f1f;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    margin-top: 12px;
  }

  th {
    background: #ffe3c7;
    padding: 8px;
    font-size: 12px;
    text-align: left;
    border-bottom: 1px solid #f5d3b5;
  }

  td {
    padding: 8px;
    font-size: 12px;
    border-bottom: 1px solid #f7e7d8;
  }

  tr:last-child td {
    border-bottom: none;
  }

  .tag {
    display: inline-block;
    padding: 3px 6px;
    margin: 2px;
    border-radius: 4px;
    background: #ffd7b3;
    color: #a14a00;
    font-size: 10px;
  }

  .good { color: #0a0; font-weight: bold; }
  .bad { color: #c00; font-weight: bold; }

.btn {
  padding: 4px 8px;
  background: #ffe3c7;
  color: #a14a00;
  border: 1px solid #f5d3b5;
  border-radius: 4px;
  font-size: 11px;
  cursor: pointer;
  margin-right: 4px;
}

.btn:hover {
  background: #ffd7b3;
}

td:last-child {
  text-align: right;
}

  @media (max-width: 600px) {
    body {
      padding: 12px;
    }
    table {
      font-size: 11px;
    }
    form {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>
  <h1>ねこごはん図鑑</h1>

<section>
  <h2>新規フード追加</h2>
  <form id="food-form">
    <input name="name" placeholder="名前" required>
    <input name="ingredients" placeholder="原材料（カンマ区切り）" required>
    <input name="protein" placeholder="タンパク(%)" type="number" required>
    <input name="fat" placeholder="脂質(%)" type="number" required>
    <input name="fiber" placeholder="繊維(%)" type="number" required>
    <input name="finishRate" placeholder="完食率(%)" type="number" required>
    <input name="interest" placeholder="食いつき(1〜5)" type="number" required>
    <button type="submit">追加</button>
  </form>
</section>

  <section>
    <h2>フード一覧</h2>
    <table id="foods-table">
      <thead>
        <tr>
          <th>名前</th>
          <th>原材料</th>
          <th>タグ</th>
          <th>成分</th>
          <th>完食率</th>
          <th>食いつき</th>
    <th>操作</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>

<h2>タグ別傾向グラフ</h2>
<canvas id="tagsChart" style="max-height:300px;"></canvas>

  <section>
    <h2>タグ別傾向</h2>
    <table id="tags-table">
      <thead>
        <tr>
          <th>タグ</th>
          <th>件数</th>
          <th>平均完食率</th>
          <th>平均食いつき</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>

<button onclick="downloadJSON()">JSON保存</button>
<input type="file" id="json-upload" accept="application/json">
<button onclick="saveToLocal()">ローカル保存</button>
<button onclick="loadFromLocal()">再読み込み</button>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="app.js"></script>
</body>
</html>
